<!DOCTYPE html>
<html lang="pt-br">
<head>

    <link rel="shortcut icon" href="favicon.ico.ico" type="image/x-icon">
    <title>Imagem Flexível</title>
</head>
<body>
    <iframe src="" frameborder="0"></iframe>
    <h1>Imagem Flexível</h1>

        <source media="(max-width: 720px)" srcset="imagens/paisagem-p.png" type="image/png">
        <source media="(max-width: 1000px)" srcset="imagens/paisagem-m.png" type="image/png">
        <img src="imagens/paisagem-g.png" alt="Imagem Flexível">
    </picture>
